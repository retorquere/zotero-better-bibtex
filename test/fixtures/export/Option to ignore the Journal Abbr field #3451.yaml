    itemType: journalArticle
    title: Hamiltonian description of internal ocean waves with Coriolis force
    abstractNote: The interfacial internal waves are formed at the pycnocline or thermocline in the ocean and are influenced by the Coriolis force due to the Earth's rotation. A derivation of the model equations for the internal wave propagation taking into account the Coriolis effect is proposed. It is based on the Hamiltonian formulation of the internal wave dynamics in the irrotational case, appropriately extended to a {\it nearly} Hamiltonian formulation which incorporates the Coriolis forces. Two propagation regimes are examined, the long-wave and the intermediate long-wave propagation with a small amplitude approximation for certain geophysical scales of the physical variables. The obtained models are of the type of the well-known Ostrovsky equation and describe the wave propagation over the two spatial horizontal dimensions of the ocean surface.
