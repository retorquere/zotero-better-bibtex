name: automated tests

on:
  push: null
  pull_request: null
  schedule:
  - cron: 0 0 * * *

permissions:
  contents: write

_anchors:
  get_version: &get_version
    name: get package version
    run: echo "version="`jq -r .version package.json` >> $GITHUB_ENV
  install_python: &install_python
    name: install python
    uses: actions/setup-python@v6
    with:
      python-version: '3.12'
      cache: 'pip'
  install_node: &install_node
    name: install node
    uses: actions/setup-node@v6
    with:
      node-version: 26.x
  install_python_packages: &install_python_packages
    name: install python packages
    run: |
      python -m pip install --upgrade pip
      pip install packaging xvfbwrapper
      pip install -r requirements.txt
  install_node_packages: &install_node_packages
    name: install node packages
    run: npm install --no-package-lock && npm ls
  checkout: &checkout
    name: Checkout repository
    uses: actions/checkout@v7
    with:
      persist-credentials: false
      fetch-depth: 1
      submodules: recursive

jobs:
  build:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.ref != 'refs/heads/master' && github.ref != 'refs/heads/l10n_master') ||
      (github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[tagged build]'))
    outputs:
      bin_ids: ${{ env.bin_ids }}
      bins: ${{ env.bins }}
      clients: ${{ env.clients }}
      slow: ${{ env.slow }}
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - name: get package version
      run: echo "version="`jq -r .version package.json` >> $GITHUB_ENV
    - *install_python
    - *install_python_packages
    - *install_node
    - *install_node_packages
    - name: set slow/beta/whopper flags
      run: ./util/action-flags
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}

    - name: sync Zotero maxVersion
      id: zotero_compat
      if: github.event_name == 'schedule'
      run: |
        python - <<'PY'
        import json
        import urllib.request
        from pathlib import Path

        with urllib.request.urlopen('https://www.zotero.org/download/client/version?channel=beta') as response:
          version = json.load(response)['linux-x86_64']

        package_json = Path('package.json')
        package = json.loads(package_json.read_text())

        package['xpi']['maxVersion'] = f"{version.split('.', 1)[0]}.*"

        package_json.write_text(json.dumps(package, indent=2) + '\n')
        PY

        if git diff --quiet -- package.json; then
          echo 'updated=false' >> "$GITHUB_OUTPUT"
        else
          echo 'updated=true' >> "$GITHUB_OUTPUT"
        fi

    - name: commit package.json compatibility update
      if: github.event_name == 'schedule' && github.ref == 'refs/heads/master' && steps.zotero_compat.outputs.updated == 'true'
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add package.json
        git commit -m 'Update Zotero compatibility range'
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: get previous test durations
      run: curl -L https://github.com/retorquere/zotero-better-bibtex/releases/download/builds/durations.json --create-dirs -o test/balance/durations.json

    - name: balance tests
      id: balance
      run: ./util/balance.py --durations test/balance/durations.json --bins test/balance/bins.json --minutes 10 ${{ env.slow }} ${{ env.beta }}

    - name: build ${{ env.beta }} ${{ env.legacy }}
      run: npm run build
      env:
        VERSION_WITH_ISSUE: false

    - name: publish debug bridge
      run: ./util/publish-debug-bridge.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: store build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-artifacts
        path: |
          xpi/
          gen/
          test/balance/
        retention-days: 1

  site:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[tagged build]')
    steps:
    - *checkout
    - *install_python
    - *install_python_packages
    - *install_node
    - *install_node_packages
    - name: Install Latest Hugo
      run: |
        python3 -c '
        import urllib.request, json
        with urllib.request.urlopen("https://api.github.com/repos/gohugoio/hugo/releases/latest") as r:
          assets = json.loads(r.read())["assets"]
        target = next(a["browser_download_url"] for a in assets if all(x in a["name"] for x in ["hugo_extended", "linux-amd64", ".tar.gz"]))
        print(f"Downloading {target}...")
        urllib.request.urlretrieve(target, "hugo.tar.gz")
        '
        tar -xzf hugo.tar.gz hugo
        sudo mv hugo /usr/local/bin/
        hugo version
    - name: prepare docs for deploy
      run: npm run docs:deploy
    - name: deploy site
      uses: peaceiris/actions-gh-pages@v4
      if: ${{ success() }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site/public

  test:
    needs:
    - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bin: ${{ fromJSON(needs.build.outputs.bin_ids) }}
        client: ${{ fromJSON(needs.build.outputs.clients) }}
        worker: ['--worker', '--no-worker']
    steps:
    - *checkout
    - name: fetch build artifacts
      uses: actions/download-artifact@v8
      with:
        name: build-artifacts
    - *install_python
    - *install_python_packages

    - name: Set system-wide proxy using PAC URL
      run: |
        echo "auto_proxy=http://proxy-doc.ird.fr/proxy.pac" | sudo tee -a /etc/environment
        echo "auto_proxy=http://proxy-doc.ird.fr/proxy.pac" >> $GITHUB_ENV

    - name: Verify proxy settings
      run: env | grep -i proxy

    - name: install ${{ matrix.client }}
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_wait_seconds: 15
        command: |
          set -e
          curl -sL https://raw.githubusercontent.com/retorquere/zotero-deb/master/install.sh | sudo bash
          sudo apt-get update
          sudo apt-get install ${{ matrix.client }}
          sudo apt-get install mesa-utils xvfb libegl1 libgl1 libdbus-glib-1-2
          sudo apt-get install wmctrl xdotool
          curl -s https://api.github.com/repos/jgm/pandoc/releases/latest | jq -r '.assets[] | select(.name | endswith("linux-amd64.tar.gz")) | .browser_download_url' | xargs wget -q -O pandoc.tar.gz
          tar xvzf pandoc.tar.gz
          sudo mv pandoc*/bin/pandoc /usr/bin
          pandoc -v

          cargo install hayagriva --features cli && hayagriva --version

          # preserve log hierarchy
          mkdir -p stats
          mkdir -p .stats
          mktemp .stats/stats.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

    - name: Run tests
      # continue-on-error: ${{ matrix.client == 'jurism' }}
      run: ./test/behave --client ${{ matrix.client }} ${{ matrix.worker }} ${{ needs.build.outputs.slow }} --bin ${{ matrix.bin }} --bins ${{ needs.build.outputs.bins }} --durations test/stats/durations--${{ matrix.client }}${{ matrix.worker }}--${{ matrix.bin }}.json
      env:
        PYTHONUNBUFFERED: true

    - name: save log on failure
      if: ${{ failure() || cancelled() }}
      run: |
        touch ~/.BBTTEST.log
        cp ~/.BBTTEST.log ~/BBTTEST--${{ matrix.client }}--${{ matrix.bin }}${{ matrix.worker }}.txt
        cp ~/.BBTTEST/zotero/zotero.sqlite ~/BBTTEST--${{ matrix.client }}--${{ matrix.bin }}${{ matrix.worker }}.zotero.sqlite
        cp -r ~/.BBTTEST ~/BBTTEST
    - name: upload log on failure
      if: ${{ failure() || cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: debug-log--${{ matrix.client }}--${{ matrix.bin }}${{ matrix.worker }}
        path: |
          ~/BBTTEST*.txt
          ~/BBTTEST/zotero/*.sqlite
          ~/BBTTEST/*.txt
          exported/
        retention-days: 5

    - name: store test artifacts
      if: matrix.client == 'zotero' && matrix.worker == '--worker' && github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v7
      with:
        name: test-artifacts--${{ matrix.client }}--${{ matrix.bin }}${{ matrix.worker }}
        path: ./*/stats/durations*
        retention-days: 2

#    - name: Setup tmate session
#      if: ${{ failure() }}
#      uses: mxschmitt/action-tmate@v3
#      with:
#        limit-access-to-actor: true

  release:
    if: github.event_name != 'schedule'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
    - *checkout

    - name: fetch build artifacts
      uses: actions/download-artifact@v8
      with:
        name: build-artifacts
    - *install_python
    - *install_python_packages
    - *install_node
    - *install_node_packages

    - run: find xpi -type f
    - run: npm run release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/github-script@v9
      continue-on-error: true
      with:
        script: |
          if (process.env.XPI_RELEASED) {
            github.rest.issues.addLabels({
              issue_number: parseInt(process.env.XPI_RELEASED),
              owner: 'retorquere',
              repo: 'zotero-better-bibtex',
              labels: ['awaiting-user-feedback'],
            })
          }

  durations:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[tagged build]') && needs.build.outputs.slow == '--slow'
    needs:
      - build
      - test
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *install_python
    - *install_python_packages
    - name: fetch test artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: test-artifacts--*
        merge-multiple: true
    - name: collect test data
      run: jq -s add test/stats/durations--zotero--worker--*.json > test/stats/durations.json
    - name: Store build stats
      run: |
        gh release upload builds test/stats/durations.json --clobber --repo ${{ github.repository }}
      env:
        GH_TOKEN: ${{ github.token }}
